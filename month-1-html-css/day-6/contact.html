<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form Contact</title>
    </head>
    <body>
        <section>
            <h1>Contact Form</h1>
            <p>Please fill out the form below!</p>
        </section>
        <section>
            <form action="#">
                <label for="name">Enter your name:</label><br>
                <input id="name" type="text" placeholder="ahmad yazed" name="name" required><br><br>
                <label for="email">Enter your email:</label><br>
                <input id="email" type="email" placeholder="example@gmail.com" name="email" required><br><br>
                <label for="message">Your message here:</label><br>
                <textarea id="message" name="message" rows="4" cols="50" placeholder="Write your message..." required></textarea><br><br>
                <button type="submit">Submit</button>
            </form>
        </section>
    </body>
</html>
